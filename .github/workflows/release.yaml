name: Automated Release CI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: 拉取完整源代码和 Tag 历史
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: 提取版本信息
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${TAG_NAME#v}" >> "${GITHUB_OUTPUT}"

      - name: 生成发布说明
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          set -eu

          previous_tag="$(git describe --tags --match 'v*' --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"

          {
            echo "## 更新内容"
            echo
            if [ -n "${previous_tag}" ]; then
              echo "自 \`${previous_tag}\` 以来的所有提交："
              echo
              git log --pretty=format:'- %s (`%h`) — %an' "${previous_tag}..${TAG_NAME}"
            else
              echo "首次发布，包含截至 \`${TAG_NAME}\` 的所有提交："
              echo
              git log --pretty=format:'- %s (`%h`) — %an' "${TAG_NAME}"
            fi
            echo
          } > release-notes.md

      - name: 构建前端资产
        run: make build-frontend

      - name: 编译并打包所有平台
        run: make build-all-platforms

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: |-
            dist/*.tar.gz
            dist/*.zip
          fail_on_unmatched_files: true
